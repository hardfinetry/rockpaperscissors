<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <fieldset id="humanChoiceButtons">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </fieldset>

    <div id="results">
        <p id="humanScoreId">Human Score: </p>
        <p id="computerScoreId">Computer Score: </p>
        <p id="humanChose"></p>
        <p id="computerChose"></p>
        <p id="isGameOver"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
